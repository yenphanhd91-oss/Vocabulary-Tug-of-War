<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字形迷宮：尋找神祕帥哥</title>
    <style>
        :root {
            --wall-color: #5d4037;
            --path-color: #fff9c4;
            --grass-color: #81c784;
            --primary-btn: #ff7043;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-box {
            width: 95vw;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 15px;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* --- 實體迷宮視覺區 --- */
        #maze-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 300px;
            height: 300px;
            margin: 10px auto;
            background: var(--wall-color);
            border: 5px solid var(--wall-color);
            border-radius: 8px;
            position: relative;
        }

        .cell { width: 100%; height: 100%; }
        .w { background-color: var(--wall-color); } /* Wall */
        .p { background-color: var(--path-color); } /* Path */

        #player {
            position: absolute;
            width: 30px;
            height: 30px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* 終點帥哥元件 */
        .handsome-man {
            position: absolute;
            bottom: 0; right: 0;
            width: 30px; height: 30px;
            background: #2c3e50;
            border-radius: 5px 5px 0 0;
            z-index: 5;
        }
        .handsome-man::before {
            content: '🤵🏻';
            position: absolute;
            top: -15px; left: 2px;
            font-size: 20px;
        }

        /* --- 介面樣式 --- */
        .question-area {
            background: #fff3e0;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            border: 2px solid #ffcc80;
        }
        .q-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; color: #4e342e; }
        .btn-group { display: flex; justify-content: center; gap: 15px; }
        .btn {
            padding: 10px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--primary-btn);
            color: white;
            box-shadow: 0 4px 0 #d84315;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        .stats { display: flex; justify-content: space-between; font-weight: bold; padding: 5px 10px; }
        #timer.low { color: red; animation: blink 0.5s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .error-shake { animation: shake 0.2s 2; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-ui">
        <h2 style="color: #2e7d32;">字形迷宮大冒險</h2>
        <p>請輸入大名並挑選你的角色：</p>
        <input type="text" id="p-name" placeholder="你的名字" style="padding: 8px; width: 60%; border-radius: 5px; border: 1px solid #ccc;">
        <div style="margin: 15px 0;">
            <span class="char-opt" onclick="setChar('🐱', this)" style="font-size: 40px; cursor:pointer; border: 2px solid #ff7043; border-radius: 10px; padding: 5px;">🐱</span>
            <span class="char-opt" onclick="setChar('🐰', this)" style="font-size: 40px; cursor:pointer; padding: 5px;">🐰</span>
            <span class="char-opt" onclick="setChar('🦊', this)" style="font-size: 40px; cursor:pointer; padding: 5px;">🦊</span>
            <span class="char-opt" onclick="setChar('🐶', this)" style="font-size: 40px; cursor:pointer; padding: 5px;">🐶</span>
        </div>
        <button class="btn" onclick="gameStart()">進入迷宮</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="stats">
            <div id="timer">時間：90s</div>
            <div>進度：<span id="score">0</span> / 20</div>
        </div>

        <div id="maze-board">
            <div id="player">🐱</div>
            <div class="handsome-man" style="grid-column: 10; grid-row: 10;"></div>
        </div>

        <div class="question-area">
            <div class="q-text" id="question">讀取中...</div>
            <div class="btn-group">
                <button class="btn" onclick="check(0)" id="btn0">A</button>
                <button class="btn" onclick="check(1)" id="btn1">B</button>
            </div>
        </div>
    </div>

    <div id="end-ui" class="hidden">
        <h1 id="end-title">結果</h1>
        <div id="win-msg" class="hidden">
            <div style="font-size: 60px;">🤵🏻💖</div>
            <p>「等你好久了，你真的很棒！」</p>
        </div>
        <p id="final-info"></p>
        <button class="btn" onclick="location.reload()">再玩一次</button>
        <div id="rank" style="margin-top: 20px; text-align: left; background: #f1f1f1; padding: 10px; border-radius: 10px;"></div>
    </div>
</div>

<script>
    // 迷宮地圖數據 (10x10): w=牆壁, p=路徑
    // 預先設計好一條蜿蜒的路徑，確保有 30 個點
    const mazeData = [
        'p','p','w','w','w','w','w','w','w','w',
        'w','p','w','p','p','p','w','w','w','w',
        'w','p','p','p','w','p','w','w','w','w',
        'w','w','w','w','w','p','w','w','w','w',
        'w','p','p','p','p','p','w','w','w','w',
        'w','p','w','w','w','w','w','w','w','w',
        'w','p','p','p','p','p','p','p','w','w',
        'w','w','w','w','w','w','w','p','w','w',
        'w','p','p','p','p','p','p','p','w','w',
        'w','p','w','w','w','w','w','p','p','p'
    ];

    // 路徑座標順序 (對應 p 的位置)
    const pathCoords = [
        [0,0],[1,0],[1,1],[1,2],[2,2],[3,2],[3,1],[4,1],[5,1],[5,2],[5,4],[4,4],[3,4],[2,4],[1,4],[1,5],[1,6],[1,8],[2,8],[3,8],[4,8],[5,8],[6,8],[7,8],[7,6],[6,6],[5,6],[4,6],[3,6],[7,9],[8,9],[9,9]
    ];

    const questions = [
        {q:"這件事情還（ ）完成。", a:["未","末"], c:0}, {q:"這是一年之（ ）。", a:["未","末"], c:1},
        {q:"他是一位勇敢的（ ）兵。", a:["士","土"], c:0}, {q:"地上有很多（ ）。", a:["士","土"], c:1},
        {q:"我（ ）經吃飽了。", a:["已","己"], c:0}, {q:"請先做好自（ ）管理。", a:["已","己"], c:1},
        {q:"今（ ）天氣很好。", a:["日","曰"], c:0}, {q:"孔子（ ）：「學而時習之。」", a:["曰","日"], c:0},
        {q:"有一個（ ）走進教室。", a:["人","入"], c:0}, {q:"請（ ）內坐。", a:["人","入"], c:1},
        {q:"他用（ ）切水果。", a:["刀","力"], c:0}, {q:"做事情要用（ ）氣。", a:["刀","力"], c:1},
        {q:"他有一（ ）元。", a:["千","干"], c:0}, {q:"不要隨便（ ）涉別人。", a:["千","干"], c:1},
        {q:"這是一棵大（ ）。", a:["木","本"], c:0}, {q:"這（ ）書很好看。", a:["木","本"], c:1},
        {q:"他長得很（ ）高了。", a:["大","太"], c:1}, {q:"今天（ ）陽很大。", a:["大","太"], c:1},
        {q:"今（ ）是星期五。", a:["天","夭"], c:0}, {q:"小狗不幸（ ）折。", a:["天","夭"], c:1},
        {q:"農夫在放（ ）。", a:["牛","午"], c:0}, {q:"中（ ）休息時間到了。", a:["牛","午"], c:1},
        {q:"他是國（ ）。", a:["王","玉"], c:0}, {q:"這塊（ ）很漂亮。", a:["王","玉"], c:1},
        {q:"他的頭髮很（ ）。", a:["白","百"], c:0}, {q:"他活到一（ ）歲。", a:["白","百"], c:1},
        {q:"請用眼（ ）看。", a:["目","自"], c:0}, {q:"請（ ）己完成作業。", a:["目","自"], c:1},
        {q:"他用（ ）拿東西。", a:["手","毛"], c:0}, {q:"小狗身上有很多（ ）。", a:["手","毛"], c:1}
    ];

    let currentQ = 0;
    let score = 0;
    let timer = 90;
    let timerInt;
    let myEmoji = '🐱';
    let qList = [];

    // 初始化迷宮網格
    const board = document.getElementById('maze-board');
    mazeData.forEach(type => {
        const div = document.createElement('div');
        div.className = 'cell ' + type;
        board.appendChild(div);
    });

    function setChar(emoji, el) {
        myEmoji = emoji;
        document.querySelectorAll('.char-opt').forEach(o => o.style.borderColor = "transparent");
        el.style.borderColor = "#ff7043";
        document.getElementById('player').innerText = emoji;
    }

    function gameStart() {
        document.getElementById('start-ui').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        qList = [...questions].sort(() => Math.random() - 0.5);
        updatePlayer();
        nextQ();
        timerInt = setInterval(() => {
            timer--;
            document.getElementById('timer').innerText = `時間：${timer}s`;
            if(timer <= 10) document.getElementById('timer').classList.add('low');
            if(timer <= 0) gameEnd();
        }, 1000);
    }

    function nextQ() {
        if(currentQ >= qList.length) { gameEnd(); return; }
        const data = qList[currentQ];
        document.getElementById('question').innerText = data.q;
        document.getElementById('btn0').innerText = data.a[0];
        document.getElementById('btn1').innerText = data.a[1];
    }

    function check(idx) {
        if(qList[currentQ].c === idx) {
            score++;
            document.getElementById('score').innerText = score;
            updatePlayer();
            if(score >= 20) { setTimeout(gameEnd, 300); return; }
        } else {
            document.getElementById('game-box').classList.add('error-shake');
            setTimeout(() => document.getElementById('game-box').classList.remove('error-shake'), 300);
        }
        currentQ++;
        nextQ();
    }

    function updatePlayer() {
        const p = document.getElementById('player');
        const pos = pathCoords[score]; // 根據得分決定位置
        p.style.left = (pos[0] * 30) + 'px';
        p.style.top = (pos[1] * 30) + 'px';
    }

    function gameEnd() {
        clearInterval(timerInt);
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('end-ui').classList.remove('hidden');
        
        const isWin = score >= 20;
        document.getElementById('end-title').innerText = isWin ? "成功通關！" : "挑戰失敗";
        if(isWin) document.getElementById('win-msg').classList.remove('hidden');
        
        const name = document.getElementById('p-name').value || "冒險者";
        document.getElementById('final-info').innerText = `${name} 答對了 ${score} 題，剩餘時間 ${timer} 秒。`;
        
        saveRank(name, score, 90-timer);
    }

    function saveRank(n, s, t) {
        let r = JSON.parse(localStorage.getItem('maze_rank') || "[]");
        r.push({n, s, t});
        r.sort((a,b) => b.s - a.s || a.t - b.t);
        r = r.slice(0, 5);
        localStorage.setItem('maze_rank', JSON.stringify(r));
        document.getElementById('rank').innerHTML = "<b>前五名排行：</b><br>" + r.map(i => `${i.n}: ${i.s}題 (${i.t}秒)`).join('<br>');
    }
</script>
</body>
</html>
