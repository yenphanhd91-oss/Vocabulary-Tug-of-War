<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌寵認字趣：迷宮盡頭遇見他</title>
    <style>
        :root {
            --wall-color: #6d4c41;
            --path-color: #fff9c4;
            --grass-bg: #81c784;
            --btn-main: #ff7043;
            --girl-pink: #ff80ab;
            --box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* 遊戲主容器 */
        #game-box {
            width: 90vw;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 30px;
            box-shadow: var(--box-shadow);
            text-align: center;
            border: 8px solid white;
            position: relative;
            overflow: visible;
        }

        .hidden { display: none !important; }

        /* --- 小美女角色 (放在盒子右上角內部) --- */
        .girl-anchor {
            position: absolute;
            top: -50px;
            right: 20px;
            width: 80px;
            height: 100px;
            z-index: 10;
        }
        .girl-head {
            width: 45px; height: 45px; background: #ffe0bd;
            border-radius: 50%; position: absolute; top: 10px; left: 17px;
            border: 2px solid #444; z-index: 2;
        }
        .girl-hair {
            width: 55px; height: 30px; background: #4e342e;
            border-radius: 30px 30px 0 0; position: absolute; top: 5px; left: 12px;
        }
        .girl-dress {
            width: 40px; height: 45px; background: var(--girl-pink);
            border-radius: 15px 15px 5px 5px; position: absolute; top: 50px; left: 20px;
        }
        .bubble {
            position: absolute; top: -40px; left: -80px; width: 100px;
            background: white; border: 2px solid #ff80ab; border-radius: 15px;
            padding: 5px; font-size: 0.85rem; font-weight: bold; color: #e91e63;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            opacity: 0; transition: 0.3s; transform: scale(0.8);
        }
        .bubble.show { opacity: 1; transform: scale(1); }

        /* --- 角色選擇 --- */
        .char-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .char-btn {
            font-size: 40px; cursor: pointer; padding: 12px;
            background: white; border: 3px solid #eee; border-radius: 20px;
            transition: 0.3s; box-shadow: 0 4px 0 #eee;
        }
        .char-btn.active {
            border-color: #ff4081; background: #fff0f5;
            transform: translateY(-5px); box-shadow: 0 8px 0 #f50057;
        }

        /* --- 迷宮設計 --- */
        #maze-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 320px; height: 320px;
            margin: 20px auto;
            background: var(--wall-color);
            border: 6px solid var(--wall-color);
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        }
        .p { background: var(--path-color); }
        .w { background: var(--wall-color); }
        
        #player {
            position: absolute; width: 32px; height: 32px;
            font-size: 26px; display: flex; justify-content: center; align-items: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }
        .finish-man {
            position: absolute; bottom: 0; right: 0; font-size: 26px;
        }

        /* --- 題目區 --- */
        .q-container {
            background: #f1f8e9; border-radius: 20px; padding: 20px;
            border: 2px dashed #81c784; margin-top: 10px;
        }
        .q-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; }
        .ans-group { display: flex; justify-content: center; gap: 20px; }
        .btn-ans {
            padding: 12px 35px; font-size: 1.3rem; border: none;
            border-radius: 15px; background: var(--btn-main); color: white;
            cursor: pointer; box-shadow: 0 5px 0 #e64a19; transition: 0.1s;
        }
        .btn-ans:active { transform: translateY(3px); box-shadow: 0 2px 0 #e64a19; }

        /* 標籤與進度 */
        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; color: #666; padding: 0 10px; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s 2; }
    </style>
</head>
<body>

<div id="game-box">
    <div class="girl-anchor">
        <div class="bubble" id="girl-msg">加油喔！</div>
        <div class="girl-hair"></div>
        <div class="girl-head"></div>
        <div class="girl-dress"></div>
    </div>

    <div id="screen-start">
        <h1 style="color: #388e3c; margin-bottom: 10px;">萌寵認字趣</h1>
        <p>答對題目走出迷宮，見到帥氣的他！</p>
        <input type="text" id="p-name" placeholder="輸入你的名字" style="padding: 12px; width: 80%; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 20px; font-size: 1rem;">
        
        <div class="char-grid">
            <div class="char-btn active" onclick="pick('🐱', this)">🐱</div>
            <div class="char-btn" onclick="pick('🐰', this)">🐰</div>
            <div class="char-btn" onclick="pick('🦊', this)">🦊</div>
            <div class="char-btn" onclick="pick('🐶', this)">🐶</div>
        </div>
        
        <button class="btn-ans" onclick="start()" style="width: 100%;">開始探險</button>
    </div>

    <div id="screen-game" class="hidden">
        <div class="stats-bar">
            <div id="time-left">時間：90s</div>
            <div>進度：<span id="score-now">0</span> / 20</div>
        </div>

        <div id="maze-grid">
            <div id="player">🐱</div>
            <div class="finish-man">🤵🏻</div>
        </div>

        <div class="q-container">
            <div class="q-text" id="q-display">載入中...</div>
            <div class="ans-group">
                <button class="btn-ans" id="btnA" onclick="hit(0)">A</button>
                <button class="btn-ans" id="btnB" onclick="hit(1)">B</button>
            </div>
        </div>
    </div>

    <div id="screen-end" class="hidden">
        <h1 id="end-title">結果</h1>
        <div id="win-zone" class="hidden">
            <div style="font-size: 80px;">🤵🏻💖</div>
            <p style="color: #e91e63; font-weight: bold; font-size: 1.2rem;">「你成功了！我在這裡等你很久了。」</p>
        </div>
        <p id="end-info" style="margin: 20px 0;"></p>
        <button class="btn-ans" onclick="location.reload()">再玩一次</button>
        <div id="rank-box" style="margin-top: 30px; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 15px; font-size: 0.9rem;"></div>
    </div>
</div>

<script>
    const mazeMap = ['p','p','w','w','w','w','w','w','w','w','w','p','w','p','p','p','w','w','w','w','w','p','p','p','w','p','w','w','w','w','w','w','w','w','w','p','w','w','w','w','w','p','p','p','p','p','w','w','w','w','w','p','w','w','w','w','w','w','w','w','w','p','p','p','p','p','p','p','w','w','w','w','w','w','w','w','w','p','w','w','w','p','p','p','p','p','p','p','w','w','w','p','w','w','w','w','w','p','p','p'];
    const pathPos = [[0,0],[1,0],[1,1],[1,2],[2,2],[3,2],[3,1],[4,1],[5,1],[5,2],[5,4],[4,4],[3,4],[2,4],[1,4],[1,5],[1,6],[1,8],[2,8],[3,8],[4,8],[5,8],[6,8],[7,8],[7,6],[6,6],[5,6],[4,6],[3,6],[7,9],[8,9],[9,9]];
    const quiz = [{q:"這件事情還（ ）完成。",a:["未","末"],c:0},{q:"這是一年之（ ）。",a:["未","末"],c:1},{q:"他是一位勇敢的（ ）兵。",a:["士","土"],c:0},{q:"地上有很多（ ）。",a:["士","土"],c:1},{q:"我（ ）經吃飽了。",a:["已","己"],c:0},{q:"請先做好自（ ）管理。",a:["已","己"],c:1},{q:"今（ ）天氣很好。",a:["日","曰"],c:0},{q:"孔子（ ）：「學而時習之。」",a:["曰","日"],c:0},{q:"有一個（ ）走進教室。",a:["人","入"],c:0},{q:"請（ ）內坐。",a:["人","入"],c:1},{q:"他用（ ）切水果。",a:["刀","力"],c:0},{q:"做事情要用（ ）氣。",a:["刀","力"],c:1},{q:"他有一（ ）元。",a:["千","干"],c:0},{q:"不要隨便（ ）涉別人。",a:["千","干"],c:1},{q:"這是一棵大（ ）。",a:["木","本"],c:0},{q:"這（ ）書很好看。",a:["木","本"],c:1},{q:"他長得（ ）高了。",a:["大","太"],c:1},{q:"今天（ ）陽很大。",a:["大","太"],c:1},{q:"今（ ）是星期五。",a:["天","夭"],c:0},{q:"小狗不幸（ ）折。",a:["天","夭"],c:1},{q:"農夫在放（ ）。",a:["牛","午"],c:0},{q:"中（ ）休息時間到了。",a:["牛","午"],c:1},{q:"他是國（ ）。",a:["王","玉"],c:0},{q:"這塊（ ）很漂亮。",a:["王","玉"],c:1},{q:"他的頭髮很（ ）。",a:["白","百"],c:0},{q:"他活到一（ ）歲。",a:["白","百"],c:1},{q:"請用眼（ ）看。",a:["目","自"],c:0},{q:"請（ ）己完成作業。",a:["目","自"],c:1},{q:"他用（ ）拿東西。",a:["手","毛"],c:0},{q:"小狗身上有很多（ ）。",a:["手","毛"],c:1}];

    let score = 0, time = 90, current = 0, timer, emoji = '🐱', qOrder = [];

    // 初始化地圖
    const grid = document.getElementById('maze-grid');
    mazeMap.forEach(v => {
        let d = document.createElement('div');
        d.className = 'cell ' + v;
        grid.appendChild(d);
    });

    function pick(e, el) {
        emoji = e;
        document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('player').innerText = e;
    }

    function say(m) {
        let b = document.getElementById('girl-msg');
        b.innerText = m; b.classList.add('show');
        setTimeout(() => b.classList.remove('show'), 2000);
    }

    function start() {
        if(!document.getElementById('p-name').value) return alert("請輸入名字！");
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        qOrder = [...quiz].sort(() => Math.random() - 0.5);
        render();
        timer = setInterval(() => {
            time--; document.getElementById('time-left').innerText = `時間：${time}s`;
            if(time <= 0) end();
        }, 1000);
        say("加油，你可以的！");
    }

    function render() {
        if(current >= qOrder.length) return end();
        document.getElementById('q-display').innerText = qOrder[current].q;
        document.getElementById('btnA').innerText = qOrder[current].a[0];
        document.getElementById('btnB').innerText = qOrder[current].a[1];
    }

    function hit(i) {
        if(qOrder[current].c === i) {
            score++; document.getElementById('score-now').innerText = score;
            const p = document.getElementById('player');
            p.style.left = (pathPos[score][0] * 32) + 'px';
            p.style.top = (pathPos[score][1] * 32) + 'px';
            say(["太棒了！","好厲害！","答對了！"][Math.floor(Math.random()*3)]);
            if(score >= 20) return setTimeout(end, 300);
        } else {
            document.getElementById('game-box').classList.add('shake');
            setTimeout(() => document.getElementById('game-box').classList.remove('shake'), 300);
            say("差一點點！");
        }
        current++; render();
    }

    function end() {
        clearInterval(timer);
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-end').classList.remove('hidden');
        const win = score >= 20;
        document.getElementById('end-title').innerText = win ? "🎊 挑戰成功！" : "⏰ 挑戰結束";
        if(win) { document.getElementById('win-zone').classList.remove('hidden'); say("太優秀了！"); }
        const name = document.getElementById('p-name').value;
        document.getElementById('end-info').innerText = `${name} 答對了 ${score} 題，耗時 ${90-time} 秒。`;
        
        let r = JSON.parse(localStorage.getItem('rank_maze') || "[]");
        r.push({n:name, s:score, t:90-time});
        r.sort((a,b) => b.s - a.s || a.t - b.t);
        r = r.slice(0, 5);
        localStorage.setItem('rank_maze', JSON.stringify(r));
        document.getElementById('rank-box').innerHTML = "<b>🏆 歷史前五名：</b><br>" + r.map(x => `${x.n} - ${x.s}題 (${x.t}秒)`).join('<br>');
    }
</script>
</body>
</html>
