<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌寵認字趣：迷宮盡頭遇見他</title>
    <style>
        :root {
            --wall-color: #795548; /* 溫暖的棕色 */
            --path-color: #fff9c4; /* 柔和的黃色路徑 */
            --grass-color: #c8e6c9; /* 淺綠色背景 */
            --primary-btn: #ff7043; /* 活力橙色按鈕 */
            --select-border: #e91e63; /* 鮮豔的粉紅色外框 */
            --text-color: #4e342e;
            --panel-bg: rgba(255, 255, 255, 0.9); /* 半透明面板 */
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--grass-color); /* 整體背景色 */
            background-image: radial-gradient(#a5d6a7 1px, transparent 1px); /* 微小的點點圖案 */
            background-size: 20px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 主遊戲容器 - 加上更豐富的陰影與外框 */
        #game-box {
            width: 95vw;
            max-width: 500px;
            background: var(--panel-bg);
            border-radius: 30px; /* 更圓潤的角 */
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); /* 更深的陰影 */
            padding: 25px;
            text-align: center;
            border: 10px solid white; /* 白色寬外框 */
            position: relative; /* 為了定位小美女 */
        }

        .hidden { display: none !important; }

        /* --- 小美女鼓勵角色 (Pure CSS) --- */
        .encouragement-girl {
            position: absolute;
            bottom: 20px;
            right: -80px; /* 在遊戲盒子的右側邊緣 */
            width: 70px;
            height: 120px;
            z-index: 100;
            opacity: 0.9;
        }
        
        /* 身體與裙子 */
        .girl-body {
            position: absolute;
            bottom: 0;
            left: 15px;
            width: 40px;
            height: 60px;
            background-color: #ff80ab; /* 粉紅色裙子 */
            border-radius: 20px 20px 0 0;
        }
        
        /* 頭部 */
        .girl-head {
            position: absolute;
            top: 20px;
            left: 10px;
            width: 50px;
            height: 50px;
            background-color: #ffe0bd; /* 皮膚色 */
            border-radius: 50%;
            border: 2px solid #333;
        }
        
        /* 頭髮 */
        .girl-hair {
            position: absolute;
            top: 10px;
            left: 5px;
            width: 60px;
            height: 30px;
            background-color: #6d4c41; /* 深棕色頭髮 */
            border-radius: 30px 30px 0 0;
        }
        .girl-hair-back {
            position: absolute;
            top: 35px;
            left: 0;
            width: 70px;
            height: 50px;
            background-color: #6d4c41;
            border-radius: 0 0 20px 20px;
        }
        
        /* 眼睛與嘴巴 */
        .girl-eye {
            position: absolute;
            top: 20px;
            width: 6px;
            height: 6px;
            background-color: #333;
            border-radius: 50%;
        }
        .girl-eye.left { left: 15px; }
        .girl-eye.right { right: 15px; }
        .girl-mouth {
            position: absolute;
            top: 35px;
            left: 20px;
            width: 10px;
            height: 5px;
            background-color: #ff5252;
            border-radius: 0 0 10px 10px;
        }
        
        /* 鼓勵的話語框 */
        .speech-bubble {
            position: absolute;
            top: -60px;
            left: -30px;
            width: 120px;
            background: white;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 5px 10px;
            font-size: 0.9rem;
            color: #333;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            animation: bubbleFloat 2s infinite ease-in-out;
            opacity: 0; /* 預設隱藏 */
            transition: opacity 0.3s;
        }
        
        /* 對話框的小三角形 */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }
        
        /* 當需要顯示時，加上這個類別 */
        .speech-bubble.show {
            opacity: 1;
        }

        /* --- 角色選擇樣式 --- */
        .char-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }
        .char-opt {
            font-size: 50px; /* 更大的圖示 */
            cursor: pointer;
            padding: 15px;
            border: 4px solid transparent; /* 更粗的外框 */
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 跳躍感的過場 */
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .char-opt:hover { transform: translateY(-5px) scale(1.05); }
        .char-opt.active {
            border-color: var(--select-border);
            background: #fff0f5;
            transform: scale(1.15);
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.3);
        }

        /* --- 迷宮網格 - 增加視覺深度 --- */
        #maze-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 350px; /* 稍微放大 */
            height: 350px;
            margin: 20px auto;
            background: var(--wall-color);
            border: 8px solid var(--wall-color);
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5); /* 增加內部陰影 */
            overflow: hidden; /* 防止角色跳出 */
        }
        .cell { width: 100%; height: 100%; }
        .w { background-color: var(--wall-color); position: relative; }
        /* 牆壁的小裝飾 */
        .w::after {
            content: '';
            position: absolute;
            top: 20%; left: 20%; width: 60%; height: 60%;
            background-color: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        .p { background-color: var(--path-color); }

        #player {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .handsome-man {
            position: absolute;
            bottom: 0; right: 0;
            width: 35px; height: 35px;
            z-index: 5;
            font-size: 26px;
        }

        /* --- UI 樣式 - 更加美化 --- */
        .question-area {
            background: #e3f2fd;
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            border: 3px solid #90caf9;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .q-text { font-size: 1.6rem; font-weight: bold; margin-bottom: 20px; color: #1565c0; }
        .btn-group { display: flex; justify-content: center; gap: 25px; }
        .btn {
            padding: 15px 40px;
            font-size: 1.4rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: var(--primary-btn);
            color: white;
            box-shadow: 0 5px 0 #d84315;
            transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d84315; }
        .btn:hover { background: #ff8a65; }

        .stats { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; color: #555; font-size: 1.1rem; }
        #timer.low { color: #d32f2f; animation: blink 0.5s infinite; }

        /* 輸入框美化 */
        input#p-name {
            padding: 15px;
            width: 80%;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 1.1rem;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input#p-name:focus { border-color: var(--primary-btn); outline: none; }

        /* 動畫效果 */
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .error-shake { animation: shake 0.2s 2; }
        @keyframes bubbleFloat {
            0%, 100% { transform: translateY(0) translateX(-50%); }
            50% { transform: translateY(-5px) translateX(-50%); }
        }
    </style>
</head>
<body>

<div id="game-box">
    <div class="encouragement-girl">
        <div class="girl-hair-back"></div>
        <div class="girl-body"></div>
        <div class="girl-head">
            <div class="girl-hair"></div>
            <div class="girl-eye left"></div>
            <div class="girl-eye right"></div>
            <div class="girl-mouth"></div>
        </div>
        <div class="speech-bubble" id="girl-bubble">加油喔！</div>
    </div>

    <div id="start-ui">
        <h1 style="color: #2e7d32; margin-top: 0; font-size: 2.2rem;">萌寵認字趣</h1>
        <p style="font-size: 1.1rem; color: #555;">找出正確的字，穿過迷宮見到他！</p>
        <input type="text" id="p-name" placeholder="輸入你的名字">
        
        <div class="char-container">
            <div class="char-opt active" onclick="setChar('🐱', this)">🐱</div>
            <div class="char-opt" onclick="setChar('🐰', this)">🐰</div>
            <div class="char-opt" onclick="setChar('🦊', this)">🦊</div>
            <div class="char-opt" onclick="setChar('🐶', this)">🐶</div>
        </div>
        
        <button class="btn" onclick="gameStart()">開始冒險</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="stats">
            <div id="timer">時間：90s</div>
            <div>進度：<span id="score">0</span> / 20</div>
        </div>

        <div id="maze-board">
            <div id="player">🐱</div>
            <div class="handsome-man" style="grid-column: 10; grid-row: 10;">🤵🏻</div>
        </div>

        <div class="question-area">
            <div class="q-text" id="question">載入中...</div>
            <div class="btn-group">
                <button class="btn" onclick="check(0)" id="btn0">A</button>
                <button class="btn" onclick="check(1)" id="btn1">B</button>
            </div>
        </div>
    </div>

    <div id="end-ui" class="hidden">
        <h1 id="end-title" style="font-size: 2.2rem;">結果</h1>
        <div id="win-msg" class="hidden">
            <div style="font-size: 80px; margin-bottom: 15px;">🤵🏻💖</div>
            <p style="font-size: 1.4rem; color: #e91e63; font-weight: bold; margin-bottom: 25px;">「你真的很棒，我們終於見面了！」</p>
        </div>
        <p id="final-info" style="font-size: 1.2rem; color: #333; margin-bottom: 25px;"></p>
        <button class="btn" onclick="location.reload()">再玩一次</button>
        <div id="rank" style="margin-top: 30px; text-align: left; background: #f5f5f5; padding: 20px; border-radius: 15px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);"></div>
    </div>
</div>

        {q:"農夫在放（ ）。", a:["牛","午"], c:0}, {q:"中（ ）休息時間到了。", a:["牛","午"], c:1},
        {q:"他是國（ ）。", a:["王","玉"], c:0}, {q:"這塊（ ）很漂亮。", a:["王","玉"], c:1},
        {q:"他的頭髮很（ ）。", a:["白","百"], c:0}, {q:"他活到一（ ）歲。", a:["白","百"], c:1},

        {q:"他用（ ）拿東西。", a:["手","毛"], c:0}, {q:"小狗身上有很多（ ）。", a:["手","毛"], c:1}
    ];

    let currentQ = 0;

    // 初始化地圖格子
    const board = document.getElementById('maze-board');
    mazeData.forEach(type => {
        const div = document.createElement('div');
        div.className = 'cell ' + type;
        board.appendChild(div);
    });

    // 角色選擇與紅框處理
    function setChar(emoji, el) {
        myEmoji = emoji;
        document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('player').innerText = emoji;
    }
